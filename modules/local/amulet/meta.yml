# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "amulet"
description: "Run AMULET multiplet detection and export tabular multiplet scores."
keywords:
  - amulet
  - multiplet
  - atac
tools:
  - "amulet":
      description: "AMULET multiplet detection for single-cell ATAC-seq."
      homepage: "https://github.com/UcarLab/AMULET"
      documentation: "https://github.com/UcarLab/AMULET"
      tool_dev_url: "https://github.com/UcarLab/AMULET"
      licence: ["GPL-3.0-only"]
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - fragments:
        type: file
        description: Fragments file for one sample.
        pattern: "*fragments*.{tsv,tsv.gz,csv}"
    - metrics:
        type: file
        description: Per-cell metrics table used by AMULET.
        pattern: "*.csv"
  - autosomes:
      type: file
      description: Text file listing autosomal chromosomes.
      pattern: "*.txt"
  - blacklist:
      type: file
      description: BED file with blacklist regions.
      pattern: "*.bed"
output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.txt":
          type: file
          description: Raw AMULET output text files.
          pattern: "*.txt"
  csv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.csv":
          type: file
          description: AMULET results table with p-value and q-value columns.
          pattern: "*.csv"
  versions_amulet:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "amulet":
          type: string
          description: The name of the tool
      - "echo v1.1":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@claptar"
maintainers:
  - "@claptar"
