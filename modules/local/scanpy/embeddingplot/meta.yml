# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "scanpy_embeddingplot"
description: "Generate embedding plots from AnnData using scanpy.pl.embedding."
keywords:
  - scanpy
  - embedding
  - visualization
tools:
  - "scanpy":
      description: "Single-cell analysis in Python."
      homepage: "https://scanpy.readthedocs.io"
      documentation: "https://scanpy.readthedocs.io"
      tool_dev_url: "https://github.com/scverse/scanpy"
      licence: ["BSD-3-Clause"]
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - h5ad:
        type: file
        description: Input AnnData file with embedding coordinates.
        pattern: "*.h5ad"
output:
  png:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.png":
          type: file
          description: Embedding plot images.
          pattern: "*.png"
  versions_scanpy:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "scanpy":
          type: string
          description: The name of the tool
      - "python -c 'import scanpy as sc; print(sc.__version__)'":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@claptar"
maintainers:
  - "@claptar"
